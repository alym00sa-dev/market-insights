services:
  - type: worker
    name: market-intel-pipeline
    runtime: python
    rootDir: market_intelligence_agent
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: python pipeline_worker.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GUARDIAN_API_KEY
        sync: false
      - key: NYT_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ARTIFICIAL_ANALYSIS_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ARANGO_HOST
        sync: false
      - key: ARANGO_DB
        sync: false
      - key: ARANGO_USER
        sync: false
      - key: ARANGO_PASSWORD
        sync: false
